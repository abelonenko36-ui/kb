<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KosmoBoard</title>

<style>

body{
    margin:0;
    background:#111827;
    color:white;
    font-family:Arial, sans-serif;
}

.header{
    text-align:center;
    padding:15px;
}

.logo{
font-size:60px;
font-weight:bold;
margin-bottom:40px;
animation: glow 3s ease-in-out infinite;
}
    
@keyframes glow
    {
    
0%{
text-shadow:0 0 10px rgba(255,191,36,0.3);
}

50%{
text-shadow:
0 0 20px rgba(255,191,36,0.8),
0 0 40px rgba(255,191,36,0.5);
}

100%{
text-shadow:0 0 10px rgba(255,191,36,0.3);
}

}
@keyframes medalGlow {

0%{
transform:scale(1);
filter:drop-shadow(0 0 5px gold);
}

50%{
transform:scale(1.25);
filter:
drop-shadow(0 0 10px gold)
drop-shadow(0 0 20px gold);
}

100%{
transform:scale(1);
filter:drop-shadow(0 0 5px gold);
}
    
}
    @keyframes goldFlow {

0%{
background-position:0% 50%;
}

100%{
background-position:100% 50%;
}
        
}
    @keyframes leaderPulse {

0%{
box-shadow:0 0 10px rgba(255,191,36,0.2);
}

50%{
box-shadow:0 0 35px rgba(255,191,36,0.7);
}

100%{
box-shadow:0 0 10px rgba(255,191,36,0.2);
}

}
.cards{
    display:flex;
    gap:20px;
    justify-content:center;
    margin:10px 30px 20px 30px;
}

.card{
    transition: 0.3s;
cursor:pointer;
    background:#1f2937;
    padding:25px;
    border-radius:20px;
    width:280px;
    text-align:center;
    
}
    .leader-card{
animation:leaderPulse 3s ease-in-out infinite;
border:2px solid rgba(255,191,36,0.4);
}
    .card:hover{
transform:translateY(-8px);
box-shadow:0 0 25px rgba(255,191,36,0.4);
}
    
.leaderboard{
    width:80%;
    margin:40px auto;
}

.leaderboard h2{
    text-align:center;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1f2937;
    border-radius:20px;
    overflow:hidden;
}

th{
    background:#374151;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-top:1px solid #374151;
}
.gold{
font-size:28px;

background:linear-gradient(
90deg,
#9c7700,
#ffd700,
#9c7700
);

background-size:300% 100%;
animation:goldFlow 4s linear infinite;
}

.silver{
font-size:26px;
}

.bronze{
font-size:24px;
}
.title{
    color:#9ca3af;
    font-size:18px;
}

.value{
    font-size:34px;
    font-weight:bold;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">🏆 KOSMOBOARD</div>
</div>

<div class="cards">

<div class="card leader-card">
    <div class="title">🏆 Лидер месяца</div>
    <div class="value" id="leaderName">Морозов Самсон</div>
    <div style="margin-top:10px;color:#fbbf24;font-size:22px;">
        <div id="leaderPoints">1100 баллов</div>
    </div>
</div>

<div class="card">
    <div class="title">🏙️ Город месяца</div>
    <div class="value" id="cityName">Москва</div>
    <div style="margin-top:10px;color:#60a5fa;font-size:22px;">
       <div id="cityPoints">1700 баллов</div>
    </div>
</div>

 <div class="card">
    <div class="title">📅 Период</div>
    <div class="value" id="periodText">Май 2026</div>
    <div style="margin-top:10px;color:#9ca3af;font-size:18px;">
        Обновлено сегодня
    </div>
</div>

</div>
<div class="leaderboard">

<h2>🏆 Рейтинг агентов</h2>

<table id="leaderboardTable">

<tr>
<th>Место</th>
<th>Агент</th>
<th>Город</th>
<th>Баллы</th>
</tr>

<tr class="gold">
<td style="animation: medalGlow 2s infinite;">🥇</td>
<td>Морозов Самсон</td>
<td>Мск</td>
<td>1100</td>
</tr>

<tr class="silver">
<td style="animation: medalGlow 2s infinite 0.5s;">🥈</td>
<td>Долматов Павел</td>
<td>Мск</td>
<td>600</td>
</tr>

<tr class="bronze">
<td style="animation: medalGlow 2s infinite 1s;">🥉</td>
<td>Мамчук Виктория</td>
<td>Мск</td>
<td>400</td>
</tr>

</table>

</div>
    <script>

const DASHBOARD_URL =
"https://docs.google.com/spreadsheets/d/1QL4_wG2fRgI1R4gU5cPswHT_yfT0rHuGsF25axDrmJg/export?format=csv&gid=377927329";
        
const LEADERBOARD_URL =
"https://docs.google.com/spreadsheets/d/1QL4_wG2fRgI1R4gU5cPswHT_yfT0rHuGsF25axDrmJg/gviz/tq?tqx=out:csv&sheet=LEADERBOARD";
        
async function loadDashboard() {

    const response = await fetch(DASHBOARD_URL);
    const html = await response.text();

  const lines = html.trim().split("\n");
    console.log(lines);

const data = {};

lines.forEach(line => {
  const parts = line.split(",");

  const key = parts[0]?.replace(/"/g, "").trim();
  const value = parts[1]?.replace(/"/g, "").trim();

  data[key] = value;
});

console.log(data);
console.log(Object.keys(data));
    console.log(lines);
    
const leaderName = data["Лидер месяца"] || "";
const leaderCity = data["Город лидера"] || "";
const leaderPoints = data["Баллы лидера"] || "";

const cityName = data["Город месяца"] || "";
const cityPoints = data["Баллы города"] || "";

const period = data["Период"] || "";

    document.getElementById("leaderName").innerHTML =
  leaderName + "<br>" + leaderCity;
    document.getElementById("leaderPoints").innerText =
        leaderPoints + " баллов";

    document.getElementById("cityName").innerText = cityName;
    document.getElementById("cityPoints").innerText =
        cityPoints + " баллов";

    document.getElementById("periodText").innerText = period;
}

loadDashboard();

</script>
</body>
</html>
