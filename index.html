<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KosmoBoard</title>

<style>

body{
    margin:0;
    background:#111827;
    color:white;
    font-family:Arial, sans-serif;
}

.header{
    text-align:center;
    padding:15px;
}

.logo{
font-size:60px;
font-weight:bold;
margin-bottom:40px;
animation: glow 3s ease-in-out infinite;
}
@keyframes glow {
@keyframes medalGlow {

0%{
transform:scale(1);
filter:drop-shadow(0 0 5px gold);
}

50%{
transform:scale(1.25);
filter:
drop-shadow(0 0 10px gold)
drop-shadow(0 0 20px gold);
}

100%{
transform:scale(1);
filter:drop-shadow(0 0 5px gold);
}

}
    
0%{
text-shadow:0 0 10px rgba(255,191,36,0.3);
}

50%{
text-shadow:
0 0 20px rgba(255,191,36,0.8),
0 0 40px rgba(255,191,36,0.5);
}

100%{
text-shadow:0 0 10px rgba(255,191,36,0.3);
}

}
.cards{
    display:flex;
    gap:20px;
    justify-content:center;
    margin:10px 30px 20px 30px;
}

.card{
    background:#1f2937;
    padding:25px;
    border-radius:20px;
    width:280px;
    text-align:center;
}
.leaderboard{
    width:80%;
    margin:40px auto;
}

.leaderboard h2{
    text-align:center;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1f2937;
    border-radius:20px;
    overflow:hidden;
}

th{
    background:#374151;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-top:1px solid #374151;
}
.gold{
font-size:28px;
}

.silver{
font-size:26px;
}

.bronze{
font-size:24px;
}
.title{
    color:#9ca3af;
    font-size:18px;
}

.value{
    font-size:34px;
    font-weight:bold;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">🏆 KOSMOBOARD</div>
</div>

<div class="cards">

<div class="card">
    <div class="title">🏆 Лидер месяца</div>
    <div class="value">Морозов Самсон</div>
    <div style="margin-top:10px;color:#fbbf24;font-size:22px;">
        1100 баллов
    </div>
</div>

<div class="card">
    <div class="title">🏙️ Город месяца</div>
    <div class="value">Москва</div>
    <div style="margin-top:10px;color:#60a5fa;font-size:22px;">
        1700 баллов
    </div>
</div>

 <div class="card">
    <div class="title">📅 Период</div>
    <div class="value">Май 2026</div>
    <div style="margin-top:10px;color:#9ca3af;font-size:18px;">
        Обновлено сегодня
    </div>
</div>

</div>
<div class="leaderboard">

<h2>🏆 Рейтинг агентов</h2>

<table>

<tr>
<th>Место</th>
<th>Агент</th>
<th>Город</th>
<th>Баллы</th>
</tr>

<tr class="gold">
<td style="animation: medalGlow 2s infinite;">🥇</td>
<td>Морозов Самсон</td>
<td>Мск</td>
<td>1100</td>
</tr>

<tr class="silver">
<td style="animation: medalGlow 2s infinite 0.5s;">🥈</td>
<td>Долматов Павел</td>
<td>Мск</td>
<td>600</td>
</tr>

<tr class="bronze">
<td style="animation: medalGlow 2s infinite 1s;">🥉</td>
<td>Мамчук Виктория</td>
<td>Мск</td>
<td>400</td>
</tr>

</table>

</div>
</body>
</html>
