<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏆 KOSMOBOARD</title>

<style>

body{
    margin:0;
    background:#111827;
    color:white;
    font-family:Arial, sans-serif;
}

.header{
    text-align:center;
    padding:15px;
}

.logo{
font-size:60px;
font-weight:bold;
margin-bottom:40px;
animation: glow 3s ease-in-out infinite;
}
    
@keyframes glow
    {
    
0%{
text-shadow:0 0 10px rgba(255,191,36,0.3);
}

50%{
text-shadow:
0 0 20px rgba(255,191,36,0.8),
0 0 40px rgba(255,191,36,0.5);
}

100%{
text-shadow:0 0 10px rgba(255,191,36,0.3);
}

}
   @keyframes cityGlow
    {
    0%,100%{
        box-shadow:0 0 15px rgba(96,165,250,.5);
    }

    50%{
        box-shadow:0 0 35px rgba(96,165,250,.9);
    }
}
@keyframes medalGlow {

0%{
transform:scale(1);
filter:drop-shadow(0 0 5px gold);
}

50%{
transform:scale(1.25);
filter:
drop-shadow(0 0 10px gold)
drop-shadow(0 0 20px gold);
}

100%{
transform:scale(1);
filter:drop-shadow(0 0 5px gold);
}
    
}
    @keyframes goldFlow {

0%{
background-position:0% 50%;
}

100%{
background-position:100% 50%;
}
        
}
    @keyframes leaderPulse {

0%{
box-shadow:0 0 10px rgba(255,191,36,0.2);
}

50%{
box-shadow:0 0 35px rgba(255,191,36,0.7);
}

100%{
box-shadow:0 0 10px rgba(255,191,36,0.2);
}

}
.cards{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:150px;
    margin:20px auto 40px;
}

.card{
    width:300px;
    height:220px;

    display:flex;
    flex-direction:column;
    justify-content:center;

    background:rgba(31,41,55,0.85);
backdrop-filter:blur(12px);
    border-radius:20px;
    text-align:center;
}
   .leader-card{
    animation:leaderPulse 3s ease-in-out infinite;
}

.city-card{
    animation:cityGlow 2s infinite;
}
    
.period-banner{
    display:flex;
    align-items:center;
    justify-content:center;

    font-size:24px;
    font-weight:700;

    color:#d1d5db;

    min-width:180px;
    opacity:0.85;
}
    .card:hover{
transform:translateY(-8px);
box-shadow:0 0 25px rgba(255,191,36,0.4);
}
    
.leaderboard{
    width:90%;
    height:650px;

margin-top:-25px;
margin:-5px auto 20px auto;

    overflow:hidden;
    position:relative;
}
    
.watermark{
    position:fixed;

    left:50%;
    top:75%;

    transform:translate(-50%,-50%);

    width:550px;
    height:130px;

    background-image:url("logo kosmodom.png");
    background-repeat:no-repeat;
    background-position:center;
    background-size:100% auto;

    opacity:0.12;

    filter:drop-shadow(0 0 15px rgba(255,191,36,0.15));

    pointer-events:none;
    z-index:0;
}
  .leader-title{
    text-align:center;
    margin:10px 0 5px 0;
}
    
table{
    width:100%;
    border-collapse:collapse;

    background:rgba(31,41,55,0.25);

    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);

    border-radius:20px;
}

th{
    position:sticky;
    top:0;
    z-index:100;

    background:#1f2937;

    box-shadow:0 4px 15px rgba(0,0,0,0.4);

    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-top:1px solid rgba(255,255,255,0.08);

    background:transparent;
}
.gold{
font-size:28px;

background:linear-gradient(
90deg,
#9c7700,
#ffd700,
#9c7700
);

background-size:300% 100%;
animation:goldFlow 4s linear infinite;
}

.silver{
font-size:26px;
}

.bronze{
font-size:24px;
}
.title{
    color:#9ca3af;
    font-size:18px;
}

.value{
    font-size:34px;
    font-weight:bold;
    margin-top:10px;
}

</style>
</head>

<body

<div class="header">
    <div class="logo">🏆 KOSMOBOARD 🏆</div>
</div>

<div class="cards">

<div class="card leader-card">
    <div class="title">👑 Лидер месяца</div>
    <div class="value" id="leaderName">Морозов Самсон</div>
    <div style="margin-top:10px;color:#fbbf24;font-size:22px;">
        <div id="leaderPoints">1100 баллов</div>
    </div>
</div>

<div class="period-banner">
    📅 Май 2026
</div>

    <div class="card city-card">
    <div class="title">🏙️ Город месяца</div>
    <div class="value" id="cityName">Москва</div>
    <div style="margin-top:10px;color:#60a5fa;font-size:22px;">
       <div id="cityPoints">1700 баллов</div>
    </div>
</div>

</div>
    <h2 class="leader-title">🏆 Рейтинг агентов 🏆</h2>
    <div class="watermark"></div>
<div class="leaderboard">

<table id="leaderboardTable">

<tr>
    <th>Место</th>
    <th>Агент</th>
    <th>Город</th>
    <th>Встречи</th>
    <th>Брони</th>
    <th>Сделки</th>
    <th>Баллы</th>
</tr>

<tbody id="leaderboardBody">
</tbody>

</table>

</div>
    <script>

const DASHBOARD_URL =
"https://docs.google.com/spreadsheets/d/1QL4_wG2fRgI1R4gU5cPswHT_yfT0rHuGsF25axDrmJg/export?format=csv&gid=377927329";
        
const LEADERBOARD_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTbI68ssmGchGt4Fu0JtzwnK6D0lTZ1qnxmewAWcXwrhRJhTrRmymg4XltFNjGbBlp3tx4f5hPfZzUu/pub?gid=2065202101&single=true&output=csv";
        
async function loadDashboard() {

    const response = await fetch(DASHBOARD_URL);
    const html = await response.text();

  const lines = html.trim().split("\n");
    console.log(lines);

const data = {};

lines.forEach(line => {
  const parts = line.split(",");

  const key = parts[0]?.replace(/"/g, "").trim();
  const value = parts[1]?.replace(/"/g, "").trim();

  data[key] = value;
});

console.log(data);
console.log(Object.keys(data));
    console.log(lines);
    
const leaderName = data["Лидер месяца"] || "";
const leaderCity = data["Город лидера"] || "";
const leaderPoints = data["Баллы лидера"] || "";

const cityName = data["Город месяца"] || "";
const cityPoints = data["Баллы города"] || "";

const period = data["Период"] || "";

    document.getElementById("leaderName").innerHTML =
  leaderName + "<br>" + leaderCity;
    document.getElementById("leaderPoints").innerText =
        leaderPoints + " баллов";

    document.getElementById("cityName").innerText = cityName;
    document.getElementById("cityPoints").innerText =
        cityPoints + " баллов";

    document.getElementById("periodText").innerText = period;
}


async function loadLeaderboard() {

    const response = await fetch(LEADERBOARD_URL);
    const text = await response.text();
console.log(text);
    const rows = text.trim().split("\n");

    rows.shift();

    const tbody =
        document.getElementById("leaderboardBody");

    tbody.innerHTML = "";

    rows.forEach((row, index) => {

        const cols = row.split(",");
const agent =
    cols[1]?.replace(/"/g, "") || "";

const city =
    cols[2]?.replace(/"/g, "") || "";

const meetings =
    cols[3]?.replace(/"/g, "") || "";

const bookings =
    cols[4]?.replace(/"/g, "") || "";

const deals =
    cols[5]?.replace(/"/g, "") || "";

const points =
    cols[6]?.replace(/"/g, "") || "";
        if (!agent) return;

        let medal = "";

        if (index === 0) medal = "🥇";
        else if (index === 1) medal = "🥈";
        else if (index === 2) medal = "🥉";
        else medal = index + 1;

        const tr = document.createElement("tr");

        if (index === 0)
            tr.classList.add("gold");
        else if (index === 1)
            tr.classList.add("silver");
        else if (index === 2)
            tr.classList.add("bronze");

        tr.innerHTML = `
<td>${medal}</td>
<td>${agent}</td>
<td>${city}</td>
<td>${meetings}</td>
<td>${bookings}</td>
<td>${deals}</td>
<td>${points}</td>
`;

        tbody.appendChild(tr);
    });
}
loadDashboard();
loadLeaderboard();
      
let direction = 1;
let pause = true;

        setTimeout(() => {
    pause = false;
}, 10000);

setInterval(() => {

    if (pause) return;

    const board = document.querySelector(".leaderboard");

    board.scrollTop += direction;

   if (
    board.scrollTop + board.clientHeight >=
    board.scrollHeight &&
    direction === 1
) {

    direction = -1;
    pause = true;

    setTimeout(() => {
        pause = false;
    }, 3000);

}

if (board.scrollTop <= 0 && direction === -1) {

    direction = 1;
    pause = true;

    setTimeout(() => {
        pause = false;
    }, 30000);

}

}, 40);
</script>
</body>
</html>
