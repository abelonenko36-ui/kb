<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KosmoBoard</title>

<style>

body{
    margin:0;
    background:#111827;
    color:white;
    font-family:Arial, sans-serif;
}

.header{
    text-align:center;
    padding:30px;
}

.logo{
    font-size:48px;
    font-weight:bold;
}

.cards{
    display:flex;
    gap:20px;
    justify-content:center;
    margin:30px;
}

.card{
    background:#1f2937;
    padding:25px;
    border-radius:20px;
    width:280px;
    text-align:center;
}
.leaderboard{
    width:80%;
    margin:40px auto;
}

.leaderboard h2{
    text-align:center;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1f2937;
    border-radius:20px;
    overflow:hidden;
}

th{
    background:#374151;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-top:1px solid #374151;
}
    .gold{
    background:#a67c00;
    font-weight:bold;
    font-size:22px;
}

.silver{
    background:#6b7280;
    font-weight:bold;
    font-size:20px;
}

.bronze{
    background:#92400e;
    font-weight:bold;
    font-size:18px;
}
.title{
    color:#9ca3af;
    font-size:18px;
}

.value{
    font-size:34px;
    font-weight:bold;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">🏆 KOSMOBOARD</div>
</div>

<div class="cards">

    <div class="card">
        <div class="title">Лидер месяца</div>
        <div class="value">Морозов Самсон</div>
    </div>

    <div class="card">
        <div class="title">Город месяца</div>
        <div class="value">Москва</div>
    </div>

    <div class="card">
        <div class="title">Период</div>
        <div class="value">Май 2026</div>
    </div>

</div>
<div class="leaderboard">

<h2>🏆 Рейтинг агентов</h2>

<table>

<tr>
<th>Место</th>
<th>Агент</th>
<th>Город</th>
<th>Баллы</th>
</tr>

<tr class="gold">

<tr class="silver">

<tr class="bronze">

</table>

</div>
</body>
</html>
